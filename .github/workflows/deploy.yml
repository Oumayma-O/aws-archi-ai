name: CD - Deploy to AWS

on:
  push:
    branches: [dev, main]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: aws-architect-ai
  ECS_CLUSTER: aws-architect-ai-cluster
  ECS_SERVICE: aws-architect-ai-service
  SESSION_TABLE_NAME: architect-sessions

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure DynamoDB sessions table exists (best-effort)
        # TTL is NOT a create-table flag — it's a separate update-time-to-live
        # call (the old inline flag failed every deploy with exit 252).
        # Best-effort: the table already exists in this account; if the deploy
        # role can't describe it, don't block shipping the app on it.
        run: |
          if aws dynamodb describe-table \
               --table-name "$SESSION_TABLE_NAME" \
               --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Table $SESSION_TABLE_NAME exists."
          else
            echo "Table not visible (missing, or role lacks DescribeTable) — attempting creation…"
            aws dynamodb create-table \
              --table-name "$SESSION_TABLE_NAME" \
              --attribute-definitions \
                AttributeName=session_id,AttributeType=S \
                AttributeName=user_id,AttributeType=S \
                AttributeName=updated_at,AttributeType=S \
              --key-schema \
                AttributeName=session_id,KeyType=HASH \
              --global-secondary-indexes \
                '[{"IndexName":"user-sessions-index","KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"},{"AttributeName":"updated_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION" \
            && aws dynamodb wait table-exists \
                 --table-name "$SESSION_TABLE_NAME" --region "$AWS_REGION" \
            && aws dynamodb update-time-to-live \
                 --table-name "$SESSION_TABLE_NAME" \
                 --time-to-live-specification "Enabled=true,AttributeName=expires_at" \
                 --region "$AWS_REGION" \
            || echo "::warning::Could not provision $SESSION_TABLE_NAME (it may already exist without describe permission). Continuing deploy."
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set up QEMU + Buildx (ARM64 for AgentCore)
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push AgentCore payload image (linux/arm64)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.agentcore \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:agentcore-$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:agentcore-latest \
            --push .

      - name: Roll AgentCore runtime to the new image (if provisioned)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          RUNTIME_ID=$(aws bedrock-agentcore-control list-agent-runtimes \
            --region $AWS_REGION \
            --query "agentRuntimes[?agentRuntimeName=='aws_architect_ai_agent'].agentRuntimeId | [0]" \
            --output text 2>/dev/null || echo "None")
          if [ "$RUNTIME_ID" = "None" ] || [ -z "$RUNTIME_ID" ]; then
            echo "No AgentCore runtime provisioned yet (terraform apply with enable_agentcore=true) — skipping."
            exit 0
          fi
          # update-agent-runtime REPLACES the full config — read the current
          # role and environment variables (managed by Terraform) and pass
          # them through, or every deploy would wipe the MCP settings.
          CURRENT=$(aws bedrock-agentcore-control get-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" --region $AWS_REGION)
          ROLE_ARN=$(echo "$CURRENT" | jq -r '.roleArn')
          ENV_VARS=$(echo "$CURRENT" | jq -c '.environmentVariables // {}')
          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --role-arn "$ROLE_ARN" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$ECR_REGISTRY/$ECR_REPOSITORY:agentcore-latest\"}}" \
            --network-configuration '{"networkMode":"PUBLIC"}' \
            --environment-variables "$ENV_VARS" \
            --region $AWS_REGION >/dev/null
          echo "✅ AgentCore runtime $RUNTIME_ID rolled to agentcore-latest (env preserved)"

      - name: Deploy to ECS
        # Environment (SESSION_TABLE_NAME, AWS_REGION, …) lives in the task
        # definition; update-service has no --overrides parameter (that is a
        # run-task flag — using it here failed the deploy).
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "✅ Deployment complete!"

  terraform:
    runs-on: ubuntu-latest
    needs: []  # Runs in parallel, only on infra changes
    if: contains(github.event.head_commit.message, '[infra]')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
